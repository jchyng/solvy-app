<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--bg); font-family: var(--font-sans); }
  .section-title { font-family: var(--font-serif); font-style: italic; font-size: 12px; color: var(--ink-4); margin: 0 0 10px; }
  .group { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
  button { cursor: pointer; font-family: var(--font-sans); }
</style>
</head>
<body>
  <p class="section-title">Buttons</p>
  <div class="group">
    <!-- Primary: ink bg -->
    <button style="background:var(--ink); color:var(--bg); border:none; border-radius:9999px; padding:10px 22px; font-size:14px; font-weight:500;">문제 업로드</button>
    <!-- Accent: green -->
    <button style="background:var(--accent); color:white; border:none; border-radius:9999px; padding:10px 22px; font-size:14px; font-weight:500;">설명 시작하기</button>
    <!-- Ghost -->
    <button style="background:transparent; color:var(--ink-3); border:1px solid var(--line); border-radius:9999px; padding:9px 20px; font-size:13px; font-weight:500;">다시 촬영</button>
  </div>
  <div class="group">
    <!-- Icon + label -->
    <button style="background:var(--ink); color:var(--bg); border:none; border-radius:9999px; padding:12px; display:flex; align-items:center; justify-content:center; width:48px; height:48px;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
    </button>
    <button style="background:var(--accent); color:white; border:none; border-radius:9999px; padding:10px; display:flex; align-items:center; justify-content:center; width:40px; height:40px;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
    <!-- Disabled -->
    <button style="background:var(--ink-3); color:var(--bg); border:none; border-radius:9999px; padding:10px; display:flex; align-items:center; justify-content:center; width:40px; height:40px; opacity:0.5;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
  <!-- Mode toggle (pill) -->
  <div style="display:inline-flex; padding:4px; background:color-mix(in srgb, var(--line) 40%, transparent); border-radius:9999px; gap:2px;">
    <button style="background:var(--bg); color:var(--ink); border:none; border-radius:9999px; padding:6px 20px; font-size:13px; font-weight:500; box-shadow:0 1px 2px rgba(0,0,0,0.06);">전체 풀이</button>
    <button style="background:transparent; color:var(--ink-3); border:none; border-radius:9999px; padding:6px 20px; font-size:13px; font-weight:500;">힌트 모드</button>
  </div>
</body>
</html>
