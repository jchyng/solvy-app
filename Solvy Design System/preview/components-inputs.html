<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--bg); font-family: var(--font-sans); display: flex; flex-direction: column; gap: 12px; }
  .section-title { font-family: var(--font-serif); font-style: italic; font-size: 12px; color: var(--ink-4); margin: 0; }
</style>
</head>
<body>
  <div class="section-title">Form Inputs</div>

  <!-- Default input -->
  <div style="position:relative;">
    <input type="text" placeholder="질문하거나, 자신의 말로 설명해보세요..." style="width:100%; box-sizing:border-box; background:var(--bg-sunken); border:1px solid transparent; border-radius:9999px; padding:13px 52px 13px 20px; font-size:15px; color:var(--ink); font-family:var(--font-sans); outline:none;" />
    <div style="position:absolute; right:8px; top:50%; transform:translateY(-50%); width:36px; height:36px; border-radius:50%; background:var(--ink-3); display:flex; align-items:center; justify-content:center; opacity:0.5;">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </div>
  </div>

  <!-- Focused input -->
  <div style="position:relative;">
    <input type="text" value="판별식 D가 0보다 크면..." style="width:100%; box-sizing:border-box; background:var(--bg-elevated); border:1px solid var(--ink-3); border-radius:9999px; padding:13px 52px 13px 20px; font-size:15px; color:var(--ink); font-family:var(--font-sans); outline:none;" />
    <div style="position:absolute; right:8px; top:50%; transform:translateY(-50%); width:36px; height:36px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center;">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </div>
  </div>

  <!-- With attachment button -->
  <div style="display:flex; gap:8px; align-items:center;">
    <button style="width:44px; height:44px; border-radius:50%; background:var(--bg-elevated); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--ink-3)" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
    </button>
    <div style="flex:1; position:relative;">
      <input type="text" placeholder="질문하거나, 자신의 말로 설명해보세요..." style="width:100%; box-sizing:border-box; background:var(--bg-sunken); border:1px solid transparent; border-radius:9999px; padding:13px 52px 13px 20px; font-size:15px; color:var(--ink); font-family:var(--font-sans); outline:none;" />
      <div style="position:absolute; right:8px; top:50%; transform:translateY(-50%); width:36px; height:36px; border-radius:50%; background:var(--ink); display:flex; align-items:center; justify-content:center;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--bg)" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </div>
    </div>
  </div>
</body>
</html>
