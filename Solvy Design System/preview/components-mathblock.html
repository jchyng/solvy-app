<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--bg); font-family: var(--font-sans); display: flex; flex-direction: column; gap: 14px; }
  .section-title { font-family: var(--font-serif); font-style: italic; font-size: 12px; color: var(--ink-4); margin: 0; }
</style>
</head>
<body>
  <div class="section-title">Math Display</div>

  <!-- Display block -->
  <div style="background:var(--bg-sunken); border:1px solid var(--line); border-radius:16px; padding:20px 16px; text-align:center; overflow-x:auto;">
    <div style="font-family:var(--font-mono); font-size:20px; color:var(--ink); white-space:nowrap;">x = (-b ± √(b²−4ac)) / 2a</div>
  </div>

  <!-- Solution step with math -->
  <div style="border-left:2px solid var(--line); padding-left:16px; margin-left:8px;">
    <div style="width:12px; height:12px; background:var(--bg); border:2px solid var(--line); border-radius:50%; margin-left:-23px; margin-bottom:6px; float:left; margin-top:3px;"></div>
    <div style="font-weight:500; font-size:14px; color:var(--ink); margin-bottom:4px;">1. 계수 확인</div>
    <div style="font-size:13px; color:var(--ink-3); line-height:1.6; margin-bottom:8px;">주어진 방정식에서 a, b, c 값을 읽습니다.</div>
    <div style="background:var(--bg-elevated); border:1px solid var(--line); border-radius:12px; padding:12px 16px; font-family:var(--font-mono); font-size:13px; color:var(--ink-2); text-align:center;">a = 1, &nbsp; b = 5, &nbsp; c = 6</div>
  </div>

  <!-- Answer block -->
  <div style="background:var(--bg-elevated); border:1px solid var(--line); border-radius:22px; padding:20px; text-align:center;">
    <div style="font-family:var(--font-serif); font-style:italic; font-size:12px; color:var(--ink-4); margin-bottom:10px;">iii. Final Answer</div>
    <div style="font-family:var(--font-mono); font-size:26px; color:var(--ink); margin-bottom:6px;">x = −2, x = −3</div>
    <div style="font-size:13px; color:var(--ink-3);">두 근의 합: −5, 두 근의 곱: 6</div>
  </div>
</body>
</html>
