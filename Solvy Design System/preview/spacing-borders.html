<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--bg); font-family: var(--font-sans); }
  .section-title { font-family: var(--font-serif); font-style: italic; font-size: 12px; color: var(--ink-4); margin: 0 0 8px; }
  .row { display: flex; gap: 10px; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--line); font-size: 13px; }
  .row:last-child { border-bottom: none; }
  .preview { flex: 1; }
  .desc { font-family: var(--font-mono); font-size: 10px; color: var(--ink-4); width: 160px; }
</style>
</head>
<body>
  <p class="section-title">Borders & Elevation</p>
  <div class="row">
    <div class="preview">
      <div style="height:40px; border-radius:12px; border:1px solid var(--line); background:var(--bg-elevated);"></div>
    </div>
    <div class="desc">card · 1px line border</div>
  </div>
  <div class="row">
    <div class="preview">
      <div style="height:40px; border-radius:12px; border:2px dashed var(--line); background:var(--bg-elevated);"></div>
    </div>
    <div class="desc">drop zone · 2px dashed</div>
  </div>
  <div class="row">
    <div class="preview">
      <div style="height:40px; border-radius:12px; border:2px dashed var(--accent); background:color-mix(in srgb, var(--accent) 5%, transparent);"></div>
    </div>
    <div class="desc">drop zone active · accent</div>
  </div>
  <div class="row">
    <div class="preview">
      <div style="height:40px; border-radius:12px; background:var(--bg-elevated); box-shadow:0 1px 3px rgba(26,24,20,0.08);"></div>
    </div>
    <div class="desc">shadow-sm · icon buttons</div>
  </div>
  <div class="row">
    <div class="preview">
      <div style="height:40px; border-radius:12px; border:1px solid var(--ink-3); background:var(--bg-elevated);"></div>
    </div>
    <div class="desc">input focus · border-focus</div>
  </div>
  <div class="row">
    <div class="preview">
      <div style="height:32px; background:color-mix(in srgb, var(--bg) 80%, transparent); backdrop-filter:blur(12px); border-bottom:1px solid var(--line); border-radius:8px; display:flex; align-items:center; padding:0 12px; font-size:12px; color:var(--ink-3);">sticky header</div>
    </div>
    <div class="desc">bg/80 + backdrop-blur-md</div>
  </div>
</body>
</html>
