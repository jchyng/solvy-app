<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--bg); }
  .row { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--line); }
  .row:last-child { border-bottom: none; margin-bottom: 0; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--ink-4); margin-bottom: 4px; letter-spacing: 0.05em; }
</style>
</head>
<body>
  <div class="row">
    <div class="meta">DISPLAY · italic · 52px</div>
    <div style="font-family:'Cormorant Garamond',serif; font-style:italic; font-size:52px; color:var(--ink); line-height:1; letter-spacing:-0.02em;">Solvy</div>
  </div>
  <div class="row">
    <div class="meta">HEADING · italic · 28px</div>
    <div style="font-family:'Cormorant Garamond',serif; font-style:italic; font-size:28px; color:var(--ink); line-height:1.2;">Understanding over answers.</div>
  </div>
  <div class="row">
    <div class="meta">SECTION LABELS · italic · 13px · ink-4</div>
    <div style="font-family:'Cormorant Garamond',serif; font-style:italic; font-size:13px; color:var(--ink-4); display:flex; gap:24px;">
      <span>i. Intent</span><span>ii. Solution</span><span>iii. Final Answer</span><span>Gentle nudges</span>
    </div>
  </div>
  <div class="row">
    <div class="meta">UPRIGHT · 18px</div>
    <div style="font-family:'Cormorant Garamond',serif; font-size:18px; color:var(--ink-2);">Hint 1 &nbsp;·&nbsp; Hint 2 &nbsp;·&nbsp; Expert Insight</div>
  </div>
</body>
</html>
