<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Solvy — Mobile App</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { background: #1a1814; display: flex; align-items: stretch; justify-content: center; }
  #root { width: 100%; max-width: 420px; background: #F5F2EC; position: relative; }
  @media (max-width: 440px) { body { background: #F5F2EC; } }
</style>
</head>
<body>
<div id="root"></div>

<!-- Shared primitives first -->
<script type="text/babel" src="Shared.jsx"></script>
<script type="text/babel" src="UploadView.jsx"></script>
<script type="text/babel" src="LoadingView.jsx"></script>
<script type="text/babel" src="ResultView.jsx"></script>
<script type="text/babel" src="ChatView.jsx"></script>

<script type="text/babel">
// Inject fonts + tokens
const styleEl = document.createElement('style');
styleEl.textContent = FONTS + TOKENS;
document.head.appendChild(styleEl);

// ─── App shell ───────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = React.useState(() => {
    return localStorage.getItem('solvy_screen') || 'upload';
  });

  const go = (s) => {
    setScreen(s);
    localStorage.setItem('solvy_screen', s);
  };

  return (
    <>
      {screen === 'upload'  && <UploadView onUpload={() => { go('loading'); setTimeout(() => go('result'), 2000); }} />}
      {screen === 'loading' && <LoadingView />}
      {screen === 'result'  && <ResultView onBack={() => go('upload')} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
