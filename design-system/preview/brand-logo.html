<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 32px 40px; background: var(--bg); display: flex; flex-direction: column; align-items: flex-start; gap: 20px; }
</style>
</head>
<body>
  <!-- Main wordmark -->
  <div>
    <div style="font-family:'Cormorant Garamond',serif; font-style:italic; font-size:56px; color:var(--ink); letter-spacing:-0.02em; line-height:1;">Solvy</div>
  </div>

  <!-- Sizes -->
  <div style="display:flex; gap:32px; align-items:baseline; border-top:1px solid var(--line); padding-top:16px; width:100%;">
    <div style="font-family:'Cormorant Garamond',serif; font-style:italic; font-size:36px; color:var(--ink);">Solvy</div>
    <div style="font-family:'Cormorant Garamond',serif; font-style:italic; font-size:24px; color:var(--ink);">Solvy</div>
    <div style="font-family:'Cormorant Garamond',serif; font-style:italic; font-size:16px; color:var(--ink);">Solvy</div>
  </div>

  <!-- On accent bg -->
  <div style="background:var(--accent); border-radius:16px; padding:16px 24px; display:flex; align-items:center; gap:16px;">
    <div style="font-family:'Cormorant Garamond',serif; font-style:italic; font-size:32px; color:white;">Solvy</div>
    <div style="width:1px; height:32px; background:rgba(255,255,255,0.3);"></div>
    <div style="font-size:13px; color:rgba(255,255,255,0.75); line-height:1.4;">답을 설명하게<br>하는 앱</div>
  </div>

  <!-- On dark bg -->
  <div style="background:var(--ink); border-radius:16px; padding:16px 24px;">
    <div style="font-family:'Cormorant Garamond',serif; font-style:italic; font-size:32px; color:var(--bg);">Solvy</div>
  </div>
</body>
</html>
