<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--bg); font-family: var(--font-sans); }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
  .box { display: flex; align-items: center; justify-content: center; background: var(--bg-elevated); border: 1px solid var(--line); }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--ink-4); text-align: center; margin-top: 4px; }
  .item { display: flex; flex-direction: column; align-items: center; }
  .section-title { font-family: var(--font-serif); font-style: italic; font-size: 12px; color: var(--ink-4); margin: 0 0 8px; }
</style>
</head>
<body>
  <p class="section-title">Corner Radii</p>
  <div class="grid">
    <div class="item"><div class="box" style="width:48px;height:48px;border-radius:4px;"><span style="font-size:10px;color:var(--ink-3);">sm</span></div><div class="label">4px</div></div>
    <div class="item"><div class="box" style="width:48px;height:48px;border-radius:12px;"><span style="font-size:10px;color:var(--ink-3);">md</span></div><div class="label">12px</div></div>
    <div class="item"><div class="box" style="width:48px;height:48px;border-radius:16px;"><span style="font-size:10px;color:var(--ink-3);">lg</span></div><div class="label">16px</div></div>
    <div class="item"><div class="box" style="width:48px;height:48px;border-radius:22px;"><span style="font-size:10px;color:var(--ink-3);">xl</span></div><div class="label">22px</div></div>
    <div class="item"><div class="box" style="width:48px;height:48px;border-radius:32px;"><span style="font-size:10px;color:var(--ink-3);">2xl</span></div><div class="label">32px</div></div>
    <div class="item"><div class="box" style="width:48px;height:48px;border-radius:9999px;"><span style="font-size:10px;color:var(--ink-3);">full</span></div><div class="label">pill</div></div>
  </div>

  <p class="section-title">Spacing Scale</p>
  <div style="display:flex; flex-direction:column; gap:6px;">
    <div style="display:flex; align-items:center; gap:8px;">
      <div style="width:4px; height:16px; background:var(--accent); border-radius:2px;"></div>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">space-1 · 4px</span>
    </div>
    <div style="display:flex; align-items:center; gap:8px;">
      <div style="width:8px; height:16px; background:var(--accent); border-radius:2px;"></div>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">space-2 · 8px</span>
    </div>
    <div style="display:flex; align-items:center; gap:8px;">
      <div style="width:16px; height:16px; background:var(--accent); border-radius:2px;"></div>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">space-4 · 16px · horizontal pad</span>
    </div>
    <div style="display:flex; align-items:center; gap:8px;">
      <div style="width:24px; height:16px; background:var(--accent); border-radius:2px;"></div>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">space-6 · 24px · section gap</span>
    </div>
    <div style="display:flex; align-items:center; gap:8px;">
      <div style="width:32px; height:16px; background:var(--accent); border-radius:2px;"></div>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">space-8 · 32px</span>
    </div>
  </div>
</body>
</html>
