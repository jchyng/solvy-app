<!DOCTYPE html>

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

  @font-face {
    font-family: 'Pretendard Variable';
    font-weight: 45 920;
    font-style: normal;
    font-display: swap;

  }
  :root {
    --bg: #F5F2EC; --bg-elevated: #FBF9F4; --bg-sunken: #EEEAE1;
    --ink: #1A1814; --ink-2: #3C3932; --ink-3: #6B675D; --ink-4: #9E998E;
    --line: #E2DDD0; --accent: #3D5C4B; --accent-soft: #E0E8DF; --warn: #A65F2E;

      --bg: #13120F; --bg-elevated: #1C1B17; --bg-sunken: #0E0D0B;

  html, body { height: 100%; font-family: var(--font-sans); background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; }
`;
document.head.appendChild(styleEl);
</script>

<script type="text/babel" src="Shared.jsx"></script>
<script type="text/babel" src="Dashboard.jsx"></script>

<script type="text/babel">
ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
